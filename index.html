<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELDYAN STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0b0b0b, #020202);
    color: white;
    overflow-x: hidden;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 30px;
    color: gold;
    animation: fadeDown 1s ease;
}

.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    padding: 30px;
}

.card {
    background: rgba(255,215,0,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    padding: 20px;
    border-radius: 18px;
    width: 230px;
    text-align: center;
    transition: 0.4s;
    animation: fadeUp 0.8s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 25px rgba(255,215,0,0.3);
}

button {
    background: linear-gradient(45deg, gold, #bfa100);
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 9999;
}

.modal-content {
    background: #111;
    margin: 8% auto;
    padding: 20px;
    width: 340px;
    border-radius: 18px;
    border: 1px solid gold;
    animation: zoomIn 0.4s ease;
}

.payment-option {
    padding: 12px;
    margin: 8px 0;
    border: 1px solid rgba(255,215,0,0.3);
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.payment-option:hover {
    background: rgba(255,215,0,0.1);
}

.selected {
    background: gold;
    color: black;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: gold;
    color: black;
    padding: 10px 15px;
    border-radius: 8px;
    display: none;
    animation: fadeIn 0.3s;
}

.invoice {
    display:none;
    background:#111;
    padding:20px;
    margin:20px;
    border:1px solid gold;
    border-radius:15px;
    animation: fadeUp 0.6s ease;
}

input[type="file"]{
    margin-top:10px;
    color:white;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px)}
    to {opacity:1; transform:translateY(0)}
}

@keyframes fadeDown {
    from {opacity:0; transform:translateY(-30px)}
    to {opacity:1; transform:translateY(0)}
}

@keyframes zoomIn {
    from {transform:scale(0.7); opacity:0}
    to {transform:scale(1); opacity:1}
}
</style>
</head>

<body>
<header>ELDYAN STORE</header>

<div class="container">
<div class="card">
<h3>Nokos Indonesia</h3>
<p>Rp 5.000</p>
<button onclick="buy('Nokos Indonesia',5000)">Buy</button>
</div>

<div class="card">
<h3>Murid Nokos</h3>
<p>Rp 15.000</p>
<button onclick="buy('Murid Nokos',15000)">Buy</button>
</div>

<div class="card">
<h3>Jasbug WA</h3>
<p>Rp 4.000</p>
<button onclick="buy('Jasbug WA',4000)">Buy</button>
</div>
</div>

<div id="popup" class="modal">
<div class="modal-content">
<h3>Pilih Payment</h3>
<p id="produk"></p>

<img src="QRIS.jpg" width="150" style="border-radius:10px"><br>

<div class="payment-option" onclick="selectPayment('DANA 082247254189')">DANA <button onclick="copy('082247254189')">Copy</button></div>
<div class="payment-option" onclick="selectPayment('OVO 085829260507')">OVO <button onclick="copy('085829260507')">Copy</button></div>
<div class="payment-option" onclick="selectPayment('GOPAY 085829260507')">GOPAY <button onclick="copy('085829260507')">Copy</button></div>

<input type="file" id="bukti">

<br>
<button onclick="createInvoice()">Bayar</button>
<button onclick="closePopup()">Tutup</button>
</div>
</div>

<div id="invoice" class="invoice"></div>
<div id="toast" class="toast">Berhasil disalin!</div>

<script>
let product="";
let payment="";
let proof="";

function buy(n,h){
product=n+" Rp"+h;
document.getElementById('produk').innerText=product;
document.getElementById('popup').style.display='block';
}

function closePopup(){document.getElementById('popup').style.display='none';}

function selectPayment(p){
payment=p;
let ops=document.querySelectorAll('.payment-option');
ops.forEach(o=>o.classList.remove('selected'));
event.currentTarget.classList.add('selected');
}

function copy(text){
navigator.clipboard.writeText(text);
let t=document.getElementById('toast');
t.style.display='block';
setTimeout(()=>t.style.display='none',1500);
}

function createInvoice(){
if(payment==""){alert('Pilih payment');return;}

let file=document.getElementById('bukti').files[0];
proof = file ? file.name : 'Belum upload';

let id="ORD"+Math.floor(Math.random()*100000);
let html=`<h3>INVOICE</h3>
<p>Order ID: ${id}</p>
<p>Produk: ${product}</p>
<p>Metode: ${payment}</p>
<p>Bukti: ${proof}</p>
<p>Status: Menunggu Pembayaran</p>
<button onclick="confirmPay('${id}')">Konfirmasi ke Admin</button>`;

document.getElementById('invoice').innerHTML=html;
document.getElementById('invoice').style.display='block';
closePopup();
}

function confirmPay(id){
    let nomor = "6285829260507";

    let pesan = `Halo Admin ELDYAN STORE
Order ID: ${id}
Produk: ${product}
Metode: ${payment}

Saya sudah melakukan pembayaran.
Berikut bukti transfer saya kirim di chat ini.`;

    window.location.href =
    `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
}
</script>

</body>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELDYAN STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #050505;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    color: gold;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 20px;
}

.card {
    background: #111;
    border: 1px solid rgba(255,215,0,0.2);
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    text-align: center;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 9999; /* FIX: pastikan popup muncul di atas */
}

.modal-content {
    background: #111;
    margin: 10% auto;
    padding: 20px;
    width: 320px;
    border-radius: 15px;
}

.payment-option {
    padding: 10px;
    margin: 5px 0;
    border: 1px solid gold;
    cursor: pointer;
}

.selected { background: gold; color:black; }

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: gold;
    color: black;
    padding: 10px;
    border-radius: 5px;
    display: none;
}

.invoice {
    display:none;
    background:#111;
    padding:20px;
    margin:20px;
    border:1px solid gold;
}
</style>
</head>

<body>
<header>ELDYAN STORE</header>

<div class="container">
<div class="card">
<h3>Nokos Indonesia</h3>
<p>Rp 5.000</p>
<button onclick="buy('Nokos Indonesia',5000)">Buy</button>
</div>

<div class="card">
<h3>Murid Nokos</h3>
<p>Rp 15.000</p>
<button onclick="buy('Murid Nokos',15000)">Buy</button>
</div>

<div class="card">
<h3>Jasbug WA</h3>
<p>Rp 4.000</p>
<button onclick="buy('Jasbug WA',4000)">Buy</button>
</div>
</div>

<div id="popup" class="modal">
<div class="modal-content">
<h3>Pilih Payment</h3>
<p id="produk"></p>

<div style="margin-bottom:15px;">
    <img src="QRIS.jpg" width="180" style="border-radius:12px; box-shadow:0 0 15px rgba(255,215,0,0.4);">
    <p style="font-size:12px; opacity:0.7;">Scan QR untuk pembayaran</p>
</div>

<div class="payment-option" onclick="selectPayment('DANA 082247254189')">DANA <button onclick="copy('082247254189')">Copy</button></div>
<div class="payment-option" onclick="selectPayment('OVO 085829260507')">OVO <button onclick="copy('085829260507')">Copy</button></div>
<div class="payment-option" onclick="selectPayment('GOPAY 085829260507')">GOPAY <button onclick="copy('085829260507')">Copy</button></div>

<br>
<button onclick="createInvoice()">Bayar</button>
<button onclick="closePopup()">Tutup</button>
</div>
</div>

<div id="invoice" class="invoice"></div>
<div id="toast" class="toast">Berhasil disalin!</div>

<script>
let product="";
let payment="";

function buy(n,h){
product = n + " Rp" + h;
const popup = document.getElementById('popup');
const produkText = document.getElementById('produk');

if(!popup || !produkText){
    console.error('Element popup atau produk tidak ditemukan');
    return;
}

produkText.innerText = product;
popup.style.display = 'block';
}

function closePopup(){document.getElementById('popup').style.display='none';}

function selectPayment(p){
payment=p;
let ops=document.querySelectorAll('.payment-option');
ops.forEach(o=>o.classList.remove('selected'));
event.currentTarget.classList.add('selected');
}

function copy(text){
navigator.clipboard.writeText(text);
let t=document.getElementById('toast');
t.style.display='block';
setTimeout(()=>t.style.display='none',1500);
}

function createInvoice(){
if(payment==""){alert('Pilih payment');return;}

let id="ORD"+Math.floor(Math.random()*100000);
let html=`<h3>INVOICE</h3>
<p>Order ID: ${id}</p>
<p>Produk: ${product}</p>
<p>Metode: ${payment}</p>
<p>Status: Menunggu Pembayaran</p>
<button onclick="confirmPay('${id}')">Saya Sudah Bayar</button>`;

document.getElementById('invoice').innerHTML=html;
document.getElementById('invoice').style.display='block';
closePopup();
}

function confirmPay(id){
let nomor="6285829260507";
let pesan=`Konfirmasi pembayaran ${id} untuk ${product}`;
window.location.href=`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
}
</script>

</body>
</html>
